<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-patient: #8B5CF6;
      --primary-patient-dark: #6D28D9;
      --primary-doctor: #1D4ED8;
      --primary-doctor-dark: #1E3A8A;
      --background: #f3f4f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
  height: 100%;
  font-family: 'Poppins', sans-serif;
  /* Background color will be toggled dynamically */
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1rem;
  transition: background-color 0.4s ease;
}


    /* Floating glass container */
    .glass-container {
      display: flex;
      background: rgba(255 255 255 / 0.15);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 1rem;
      width: 100%;
      max-width: 900px;
      max-height: 85vh; /* limit height */
      overflow: hidden;
    }

    /* Left side image */
    .image-section {
      flex: 1;
      background: rgba(255 255 255 / 0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      border-top-left-radius: 1rem;
      border-bottom-left-radius: 1rem;
    }

    .image-section img {
      width: 100%;
      max-width: 350px;
      border-radius: 1rem;
      object-fit: cover;
    }

    /* Right side form container with scroll */
    .form-section {
      flex: 1;
      background: rgba(255 255 255 / 0.15);
      padding: 2rem;
      overflow-y: auto;
      max-height: 85vh; /* scroll if needed */
      border-top-right-radius: 1rem;
      border-bottom-right-radius: 1rem;
      scrollbar-width: thin;
      scrollbar-color: #aeb1ba transparent;
    }
    /* Scrollbar styles for WebKit */
    .form-section::-webkit-scrollbar {
      width: 8px;
    }
    .form-section::-webkit-scrollbar-thumb {
      background-color: rgba(139,92,246,0.8);
      border-radius: 20px;
    }
    .form-section::-webkit-scrollbar-track {
      background: transparent;
    }

    h2 {
      text-align: center;
      margin-bottom: 1rem;
      color: var(--primary-patient);
      transition: color 0.3s ease;
    }

    .role-toggle {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
      gap: 1rem;
    }

    .role-btn {
      padding: 0.5rem 1.2rem;
      border-radius: 9999px;
      border: 2px solid #ccc;
      cursor: pointer;
      font-weight: 500;
      transition: 0.3s ease;
      user-select: none;
    }

    .role-btn.active {
      background-color: var(--primary-patient);
      color: white;
      border-color: var(--primary-patient);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .name-row {
      display: flex;
      gap: 1rem;
      width: 100%;
    }

    .name-row input {
      flex: 1;
      min-width: 0;
    }

    input, select {
      padding: 0.75rem;
      font-size: 1rem;
      border-radius: 0.75rem;
      border: 1px solid #ccc;
      background: rgba(255 255 255 / 0.3);
      color: #000;
      transition: border-color 0.3s ease;
    }

    input:focus, select:focus {
      border-color: var(--primary-patient);
      outline: none;
      background: rgba(255 255 255 / 0.5);
    }

    .auth-id {
      display: none;
      padding: 0.75rem;
      font-size: 1rem;
      border-radius: 0.75rem;
      border: 1px solid #ccc;
      background: rgba(255 255 255 / 0.3);
      color: #000;
    }

    #specialtyField {
      display: none;
    }

    #workingHoursContainer {
      display: none;
      margin-top: 1rem;
    }

    #workingHoursContainer label {
      font-weight: 500;
      margin-bottom: 0.25rem;
      display: block;
      color: #000;
    }

    #workingHoursContainer input[type="time"] {
      flex: 1;
    }

    button {
      background-color: var(--primary-patient);
      color: white;
      font-weight: 600;
      padding: 0.75rem;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: var(--primary-patient-dark);
    }

    @media (max-width: 768px) {
      .glass-container {
        flex-direction: column;
        max-height: 100vh;
      }

      .image-section {
        border-radius: 1rem 1rem 0 0;
        padding: 1.5rem;
      }

      .form-section {
        border-radius: 0 0 1rem 1rem;
        max-height: 50vh;
      }

      .name-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="glass-container">
    <div class="image-section">
      <img id="roleImage" src="patient.jpeg" alt="Role Illustration">
    </div>
    <div class="form-section">
      <h2 id="roleTitle">Your Health, Streamlined</h2>
      <div class="role-toggle">
        <div class="role-btn active" id="patientBtn" onclick="selectRole('patient')">Patient</div>
        <div class="role-btn" id="doctorBtn" onclick="selectRole('doctor')">Doctor</div>
      </div>
      
      <form id="signupForm">
        <input type="hidden" id="role" name="role" value="patient">

        <div class="name-row">
          <input type="text" name="firstName" placeholder="First Name" required>
          <input type="text" name="lastName" placeholder="Last Name" required>
        </div>

        <input type="text" name="address" placeholder="Address" required>
        <input type="text" name="mobile" placeholder="Mobile Number" required>
        <input type="email" name="email" placeholder="Email ID" required>
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="text" class="auth-id" id="authIdField" name="authId" placeholder="Authorization ID (Doctors Only)">

        <select name="specialty" id="specialtyField" required>
          <option value="">Select Specialty</option>
          <option value="cardiology">Cardiology</option>
          <option value="neurology">Neurology</option>
          <option value="dermatology">Dermatology</option>
          <option value="general-medicine">General Medicine</option>
          <option value="ob-gyn">Obstetrics and Gynecology (OB/GYN)</option>
          <option value="pediatrics">Pediatrics</option>
          <option value="ophthalmology">Ophthalmology</option>
          <option value="radiology">Radiology</option>
        </select>

        <div id="workingHoursContainer">
          <label>Working Hours</label>
          <div style="display: flex; gap: 1rem;">
            <input type="time" name="workStart" id="workStart" required min="09:00" max="22:00">
            <input type="time" name="workEnd" id="workEnd" required min="09:00" max="22:00">
          </div>
        </div>

        <button type="submit">Sign Up</button>
      </form>
    </div>
  </div>

  <script>
    function selectRole(role) {
      const roleInput = document.getElementById('role');
      const patientBtn = document.getElementById('patientBtn');
      const doctorBtn = document.getElementById('doctorBtn');
      const image = document.getElementById('roleImage');
      const title = document.getElementById('roleTitle');
      const root = document.documentElement;
      const authIdField = document.getElementById('authIdField');
      const specialtyField = document.getElementById('specialtyField');
      const workingHoursContainer = document.getElementById('workingHoursContainer');
      const workStart = document.getElementById('workStart');
      const workEnd = document.getElementById('workEnd');

      roleInput.value = role;
      patientBtn.classList.remove('active');
      doctorBtn.classList.remove('active');
      document.getElementById(role + 'Btn').classList.add('active');

      if (role === 'doctor') {
        image.src = 'doctors.jpeg';
        document.body.style.backgroundColor = '#1D4ED8';
        title.textContent = 'Together for Better Healing';
        root.style.setProperty('--primary-patient', '#1D4ED8');
        root.style.setProperty('--primary-patient-dark', '#1E3A8A');
        authIdField.style.display = 'block';
        specialtyField.style.display = 'block';
        workingHoursContainer.style.display = 'block';

        specialtyField.required = true;
        workStart.required = true;
        workEnd.required = true;

        // update heading color for doctor role
        title.style.color = '#1D4ED8';

      } else {
        image.src = 'patient.jpeg';
        document.body.style.backgroundColor = '#8B5CF6';
        title.textContent = 'Your Health, Streamlined';
        root.style.setProperty('--primary-patient', '#8B5CF6');
        root.style.setProperty('--primary-patient-dark', '#6D28D9');
        authIdField.style.display = 'none';
        specialtyField.style.display = 'none';
        workingHoursContainer.style.display = 'none';

        specialtyField.required = false;
        workStart.required = false;
        workEnd.required = false;

        specialtyField.value = '';
        workStart.value = '';
        workEnd.value = '';

        // update heading color for patient role
        title.style.color = 'var(--primary-patient)';
      }
    }

    document.getElementById("signupForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const role = document.getElementById('role').value;

      if (role === "doctor") {
        const workStart = document.getElementById("workStart").value;
        const workEnd = document.getElementById("workEnd").value;

        if (!workStart || !workEnd) {
          alert("Please enter your working hours.");
          return;
        }

        if (workStart < "09:00" || workEnd > "22:00") {
          alert("Working hours must be between 09:00 AM and 10:00 PM.");
          return;
        }

        if (workStart >= workEnd) {
          alert("Start time must be earlier than end time.");
          return;
        }
      }

      const form = e.target;
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      try {
        const res = await fetch("http://localhost:3000/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          alert("Signup successful!");
          window.location.href = "login.html";
        } else {
          const errorText = await res.text();
          alert("Signup failed: " + errorText);
        }
      } catch (error) {
        console.error("Error during signup:", error);
        alert("Something went wrong!");
      }
    });

    // Initialize page with patient role selected
    selectRole('patient');
  </script>
</body>
</html>
